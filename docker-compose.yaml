version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: clipsphere
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - clipsphere_net

  minio:
    image: minio/minio
    container_name: clipsphere_minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - clipsphere_net

volumes:
  mongo_data:
  minio_data:

networks:
  clipsphere_net:
    driver: bridge